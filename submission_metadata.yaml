# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
  - "Claude"

ai_usage_summary: |
  Used Gemini 3.5 Flash via Antigravity agentic framework to design the scoring logic, construct honeypot filtering rules, and generate factual candidate reasoning. No candidate data was sent to external APIs during ranking.

methodology_summary: |
  Deterministic scoring and filtering system. Honeypot detection filters out candidates with impossible profile dates/durations and fake skills. Evaluates remaining candidates based on years of experience, current title alignment, consulting firm penalties, vector DB and NLP technical skills, and notice period/activity multipliers. Runs in 10-15 seconds on a single CPU core.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
